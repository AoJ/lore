# cargo-mutants config. Run via `make mutants` or `cargo mutants`.
# Docs: https://mutants.rs/

# Scope to lore-core. UI/server/worker have Dioxus/network deps that make
# mutation runs slow and noisy; revisit when we extract more pure logic
# from them. Submodule files in db/ are included via the recursive glob.
examine_globs = [
    "crates/lore-core/src/**/*.rs",
]

# Skip generated / non-logic files.
exclude_globs = [
    "crates/lore-core/build.rs",
    "**/migrations/*.sql",
]

# Unkillable / equivalent mutants — excluded with justification so the run
# stays at 0 missed and a real regression stands out.
#
# 1. `replace proofs::*` — the Kani proof harnesses live in `#[cfg(kani)] mod
#    proofs` blocks (rules.rs, url_extract.rs, search.rs). They are never
#    compiled under `cargo test`, so cargo-mutants can empty their bodies but
#    no test can ever observe the change. They are verified by `make verify`
#    (Kani), not by the test suite — mutating them is pure noise here.
#
# 2. `|| → &&` in `lcs_pairs` (merge.rs) — the `if m == 0 || n == 0` early
#    return is a fast path. With `&&`, a one-empty input falls through to the
#    dp + traceback below, which still yields an empty `Vec` (the traceback's
#    `while i < m && j < n` exits immediately). Output is identical, so the
#    mutant is behaviourally equivalent and cannot be killed by any test.
#
# 3. merge.rs:115:43 `dp[i][j + 1] → dp[i][j]` in the lcs_pairs traceback.
#    Line 115 runs only on a mismatch, where the (unmutated) dp fill gives
#    dp[i][j] == max(dp[i+1][j], dp[i][j+1]). Hence the direction test
#    `dp[i+1][j] >= dp[i][j+1]` is identically equal to `dp[i+1][j] >= dp[i][j]`
#    — provably equivalent. (Confirmed empirically: the exhaustive lcs_pairs
#    oracle test exercises every short input and does not distinguish it.)
#    Line:col-pinned because the same "+ → *" text also covers REAL,
#    test-killed mutants elsewhere on lines 101/103/115:24.
exclude_re = [
    "replace proofs::",
    "replace \\|\\| with && in lcs_pairs",
    "merge\\.rs:115:43: replace \\+ with \\* in lcs_pairs",
]

# Test only the package we're mutating (lore-core) — its unit tests +
# tests/*.rs integration suite cover the mutated code. Compiling the UI
# (Dioxus) and worker (headless Chrome) for every mutant would add minutes
# per cycle for zero extra coverage.
test_package = ["lore-core"]
test_workspace = false

# A mutant that hangs gets killed at 5× the baseline test time.
timeout_multiplier = 5.0
