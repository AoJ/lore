name: Release

# Tag-driven release. The WASM web bundle is built once (nix: dx + wasm-bindgen
# are version-pinned in the flake) and handed to the OS jobs, which bake it into
# `lore-serve` via the `embed-web` feature — so each server binary is a single
# self-contained file (no separate web bundle to deploy and keep in sync).
# lore-ui (desktop) ships macOS-only; lore-worker builds on Linux/macOS (drives
# a headless browser); the rest are portable headless binaries.

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # WASM web frontend bundle, built with the pinned toolchain. Not a release
  # asset on its own — it's an artifact the OS jobs download and embed into
  # lore-serve.
  web:
    name: web bundle (nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: build web bundle
        run: nix develop ./dev-env --command make web
      - name: upload bundle for embedding
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
          retention-days: 1

  # Portable headless binaries: cli, server (web embedded), worker.
  linux:
    name: linux ${{ matrix.target }}
    needs: web
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm   # Raspberry Pi / Oracle Ampere
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: build
        run: |
          cargo build --release --target ${{ matrix.target }} -p lore-cli -p lore-worker
          cargo build --release --target ${{ matrix.target }} -p lore-server --features embed-web
      - name: package
        shell: bash
        run: |
          DIR="target/${{ matrix.target }}/release"
          ARCHIVE="lore-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          mkdir staging
          for bin in lore lore-serve lore-worker; do
            cp "$DIR/$bin" staging/
          done
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true

  # Windows headless binaries (cli + server, web embedded). No worker (drives a
  # headless browser; not built for Windows).
  windows:
    name: windows x86_64
    needs: web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-windows
      - name: build
        run: |
          cargo build --release -p lore-cli
          cargo build --release -p lore-server --features embed-web
      - name: package
        shell: bash
        run: |
          ARCHIVE="lore-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"
          7z a "$ARCHIVE" ./target/release/lore.exe ./target/release/lore-serve.exe
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true

  # macOS: desktop app (lore-ui) + headless binaries (server web embedded).
  # Apple Silicon runner.
  macos:
    name: macOS aarch64
    needs: web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos
      # wry links the system WebKit framework; milkdown.js is committed
      # (include_str!), so no node step is needed.
      - name: build
        run: |
          cargo build --release --target aarch64-apple-darwin \
            -p lore-cli -p lore-worker -p lore-ui
          cargo build --release --target aarch64-apple-darwin \
            -p lore-server --features embed-web
      - name: package
        shell: bash
        run: |
          DIR="target/aarch64-apple-darwin/release"
          ARCHIVE="lore-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz"
          mkdir staging
          for bin in lore lore-serve lore-worker lore-desktop; do
            cp "$DIR/$bin" staging/
          done
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
