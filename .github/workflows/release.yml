name: Release

# Tag-driven release. The WASM web bundle is built once (nix: dx + wasm-bindgen
# are version-pinned in the flake) and handed to the OS jobs, which bake it into
# `lore-serve` via the `embed-web` feature — so each server binary is a single
# self-contained file (no separate web bundle to deploy and keep in sync).
# lore-ui (desktop) ships macOS-only; lore-worker builds on Linux/macOS (drives
# a headless browser); the rest are portable headless binaries.

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # WASM web frontend bundle, built with the pinned toolchain. Not a release
  # asset on its own — it's an artifact the OS jobs download and embed into
  # lore-serve.
  web:
    name: web bundle (nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: build web bundle
        # `#web`: minimal shell (no CloakBrowser / WebKitGTK / cargo-* tools) so
        # the closure fits the runner's disk.
        run: nix develop ./dev-env#web --command make web
      - name: upload bundle for embedding
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
          retention-days: 1

  # Portable headless binaries: cli, server (web embedded), worker.
  linux:
    name: linux ${{ matrix.target }}
    needs: web
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm   # Raspberry Pi / Oracle Ampere
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: build
        run: |
          cargo build --release --target ${{ matrix.target }} -p lore-cli -p lore-worker
          cargo build --release --target ${{ matrix.target }} -p lore-server --features embed-web
      - name: package
        shell: bash
        run: |
          DIR="target/${{ matrix.target }}/release"
          ARCHIVE="lore-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          mkdir staging
          for bin in lore lore-serve lore-worker; do
            cp "$DIR/$bin" staging/
          done
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true

  # Windows headless binaries (cli + server, web embedded). No worker (drives a
  # headless browser; not built for Windows).
  windows:
    name: windows x86_64
    needs: web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-windows
      - name: build
        run: |
          cargo build --release -p lore-cli
          cargo build --release -p lore-server --features embed-web
      - name: package
        shell: bash
        run: |
          ARCHIVE="lore-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"
          7z a "$ARCHIVE" ./target/release/lore.exe ./target/release/lore-serve.exe
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true

  # macOS: desktop app (lore-ui) + headless binaries (server web embedded).
  # Apple Silicon runner.
  macos:
    name: macOS aarch64
    needs: web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos
      # wry links the system WebKit framework; milkdown.js is committed
      # (include_str!), so no node step is needed.
      - name: build
        run: |
          cargo build --release --target aarch64-apple-darwin \
            -p lore-cli -p lore-worker -p lore-ui
          cargo build --release --target aarch64-apple-darwin \
            -p lore-server --features embed-web
      - name: package headless tarball
        shell: bash
        run: |
          DIR="target/aarch64-apple-darwin/release"
          ARCHIVE="lore-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz"
          mkdir staging
          for bin in lore lore-serve lore-worker lore-desktop; do
            cp "$DIR/$bin" staging/
          done
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      # Assemble Lore.app by hand from the built binary (dx bundle needs the
      # nix-pinned dx; this runner is on rustup). iconutil generates the .icns
      # from the committed 512px PNG; ad-hoc codesign so it launches on Apple
      # Silicon. Homebrew installs this via the cask (curl download = no
      # com.apple.quarantine, so no Gatekeeper "unverified developer" dialog).
      - name: package Lore.app
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DIR="target/aarch64-apple-darwin/release"
          VERSION="${TAG#v}"
          APP="Lore.app"
          rm -rf "$APP"; mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$DIR/lore-desktop" "$APP/Contents/MacOS/lore-desktop"
          chmod +x "$APP/Contents/MacOS/lore-desktop"

          # .icns from the 512px source (512->1024 upscale for the @2x slot is
          # acceptable for now; swap in a 1024px master later for crisp Retina).
          ICONSET="lore.iconset"; rm -rf "$ICONSET"; mkdir "$ICONSET"
          for sz in 16 32 128 256 512; do
            sips -z $sz $sz crates/lore-ui/assets/icon.png \
              --out "$ICONSET/icon_${sz}x${sz}.png" >/dev/null
            dbl=$((sz * 2))
            sips -z $dbl $dbl crates/lore-ui/assets/icon.png \
              --out "$ICONSET/icon_${sz}x${sz}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/lore.icns"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Lore</string>
            <key>CFBundleDisplayName</key><string>Lore</string>
            <key>CFBundleIdentifier</key><string>cz.n13.aoj.lore</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>lore-desktop</string>
            <key>CFBundleIconFile</key><string>lore.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          codesign --force --deep --sign - "$APP"

          APP_ARCHIVE="Lore-${TAG}-aarch64-apple-darwin.zip"
          ditto -c -k --keepParent "$APP" "$APP_ARCHIVE"
          echo "APP_ARCHIVE=$APP_ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.APP_ARCHIVE }}
          generate_release_notes: true

  # Bump the Homebrew tap (AoJ/homebrew-lore): download the just-published
  # assets, hash them, render the formula + cask from tools/homebrew templates,
  # and push to the tap. Runs after every build job so all assets exist.
  # GITHUB_TOKEN reads this repo's release; DEPS_UPDATE_TOKEN (write on both
  # repos) pushes to the tap — the default token can't push cross-repo.
  homebrew:
    name: bump homebrew tap
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dist \
            --pattern "lore-$TAG-*.tar.gz" \
            --pattern "Lore-$TAG-*.zip"
          ls -l dist
      - name: render formula + cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          sha() { sha256sum "dist/$1" | awk '{print $1}'; }
          SHA_MACOS_ARM="$(sha "lore-$TAG-aarch64-apple-darwin.tar.gz")"
          SHA_LINUX_X86="$(sha "lore-$TAG-x86_64-unknown-linux-gnu.tar.gz")"
          SHA_LINUX_ARM="$(sha "lore-$TAG-aarch64-unknown-linux-gnu.tar.gz")"
          SHA_APP="$(sha "Lore-$TAG-aarch64-apple-darwin.zip")"

          # The cask downloads via the GitHub API asset endpoint (the only way to
          # auth a private-repo asset from a cask), which needs the numeric asset
          # id — resolve it for this release.
          CASK_ASSET_ID="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq ".assets[] | select(.name==\"Lore-$TAG-aarch64-apple-darwin.zip\") | .id")"
          if [ -z "$CASK_ASSET_ID" ]; then
            echo "::error::could not resolve cask asset id for Lore-$TAG-aarch64-apple-darwin.zip"
            exit 1
          fi

          mkdir -p out/Formula out/Casks
          render() {
            sed -e "s/@@VERSION@@/$VERSION/g" \
                -e "s/@@SHA_MACOS_ARM@@/$SHA_MACOS_ARM/g" \
                -e "s/@@SHA_LINUX_X86@@/$SHA_LINUX_X86/g" \
                -e "s/@@SHA_LINUX_ARM@@/$SHA_LINUX_ARM/g" \
                -e "s/@@SHA_APP@@/$SHA_APP/g" \
                -e "s/@@CASK_ASSET_ID@@/$CASK_ASSET_ID/g" \
                "$1"
          }
          render tools/homebrew/lore.formula.rb > out/Formula/lore.rb
          render tools/homebrew/lore.cask.rb    > out/Casks/lore.rb
      - name: push to tap
        env:
          TAP_TOKEN: ${{ secrets.DEPS_UPDATE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/AoJ/homebrew-lore.git" tap
          mkdir -p tap/Formula tap/Casks
          cp out/Formula/lore.rb tap/Formula/lore.rb
          cp out/Casks/lore.rb   tap/Casks/lore.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "tap already up to date"
          else
            git commit -m "lore $VERSION"
            git push
          fi
