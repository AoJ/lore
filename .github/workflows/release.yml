name: Release

# Tag-driven release. The WASM web bundle is built once (nix: dx + wasm-bindgen
# are version-pinned in the flake) and handed to the OS jobs, which bake it into
# `lore-serve` via the `embed-web` feature — so each server binary is a single
# self-contained file (no separate web bundle to deploy and keep in sync).
# lore-ui (desktop) ships macOS-only; lore-worker builds on Linux/macOS (drives
# a headless browser); the rest are portable headless binaries.

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # WASM web frontend bundle, built with the pinned toolchain. Not a release
  # asset on its own — it's an artifact the OS jobs download and embed into
  # lore-serve.
  web:
    name: web bundle (nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: build web bundle
        # `#web`: minimal shell (no CloakBrowser / WebKitGTK / cargo-* tools) so
        # the closure fits the runner's disk.
        run: nix develop ./dev-env#web --command make web
      - name: upload bundle for embedding
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
          retention-days: 1

  # Portable headless binaries: cli, server (web embedded), worker.
  linux:
    name: linux ${{ matrix.target }}
    needs: web
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm   # Raspberry Pi / Oracle Ampere
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: build
        run: |
          cargo build --release --target ${{ matrix.target }} -p lore-cli -p lore-worker
          cargo build --release --target ${{ matrix.target }} -p lore-server --features embed-web
      - name: package
        shell: bash
        run: |
          DIR="target/${{ matrix.target }}/release"
          ARCHIVE="lore-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          mkdir staging
          for bin in lore lore-serve lore-worker; do
            cp "$DIR/$bin" staging/
          done
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true

  # Windows headless binaries (cli + server, web embedded). No worker (drives a
  # headless browser; not built for Windows).
  windows:
    name: windows x86_64
    needs: web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-windows
      - name: build
        run: |
          cargo build --release -p lore-cli
          cargo build --release -p lore-server --features embed-web
      - name: package
        shell: bash
        run: |
          ARCHIVE="lore-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"
          7z a "$ARCHIVE" ./target/release/lore.exe ./target/release/lore-serve.exe
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true

  # macOS: desktop app (lore-ui) + headless binaries (server web embedded).
  # Apple Silicon runner.
  macos:
    name: macOS aarch64
    needs: web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: fetch web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos
      # wry links the system WebKit framework; milkdown.js is committed
      # (include_str!), so no node step is needed.
      - name: build
        run: |
          cargo build --release --target aarch64-apple-darwin \
            -p lore-cli -p lore-worker -p lore-ui
          cargo build --release --target aarch64-apple-darwin \
            -p lore-server --features embed-web
      # Assemble Lore.app by hand from the built binary (dx bundle needs the
      # nix-pinned dx; this runner is on rustup). iconutil generates the .icns
      # from the committed 512px PNG. Signing/notarization happens in the next
      # step.
      - name: build Lore.app
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DIR="target/aarch64-apple-darwin/release"
          VERSION="${TAG#v}"
          APP="Lore.app"
          rm -rf "$APP"; mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$DIR/lore-desktop" "$APP/Contents/MacOS/lore-desktop"
          chmod +x "$APP/Contents/MacOS/lore-desktop"

          # .icns from the 512px source (512->1024 upscale for the @2x slot is
          # acceptable for now; swap in a 1024px master later for crisp Retina).
          ICONSET="lore.iconset"; rm -rf "$ICONSET"; mkdir "$ICONSET"
          for sz in 16 32 128 256 512; do
            sips -z $sz $sz crates/lore-ui/assets/icon.png \
              --out "$ICONSET/icon_${sz}x${sz}.png" >/dev/null
            dbl=$((sz * 2))
            sips -z $dbl $dbl crates/lore-ui/assets/icon.png \
              --out "$ICONSET/icon_${sz}x${sz}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/lore.icns"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Lore</string>
            <key>CFBundleDisplayName</key><string>Lore</string>
            <key>CFBundleIdentifier</key><string>cz.n13.aoj.lore</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>lore-desktop</string>
            <key>CFBundleIconFile</key><string>lore.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
      # Developer ID sign (hardened runtime + secure timestamp, both required for
      # notarization), notarize via notarytool (App Store Connect API key), and
      # staple the ticket so the app validates offline. Done in an ephemeral
      # keychain that's deleted on exit.
      - name: sign + notarize + staple Lore.app
        shell: bash
        env:
          APPLE_KEY_P12: ${{ secrets.APPLE_KEY_P12 }}
          APPLE_KEY_P12_PWD: ${{ secrets.APPLE_KEY_P12_PWD }}
          APPLE_NOTARY_KEY_P8: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="Lore.app"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KCPW="$(uuidgen)"
          # Always wipe the keychain (→ removes the imported key+cert and drops
          # it from the search list) AND the decoded secret files, even on
          # failure. (The GitHub runner is ephemeral too, but defense in depth.)
          cleanup() {
            security delete-keychain "$KEYCHAIN" 2>/dev/null || true
            rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notary.p8" "$RUNNER_TEMP/notarize.zip"
          }
          trap cleanup EXIT

          # ephemeral keychain with the Developer ID identity
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          printf '%s' "$APPLE_KEY_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_KEY_P12_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KEYCHAIN"
          # make the keychain visible to codesign (prepend to the user search list)
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/"//g')

          # pick the signing identity belonging to our team (no hardcoded hash)
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep "$APPLE_TEAM_ID" | grep -oE '[0-9A-F]{40}' | head -1)"
          if [ -z "$IDENTITY" ]; then
            echo "::error::no Developer ID identity for team $APPLE_TEAM_ID in the keychain"
            exit 1
          fi

          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"

          # notarize (API key) and staple
          printf '%s' "$APPLE_NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          # --timeout bounds the wait: notarization is usually minutes, but the
          # FIRST submission from a new Developer ID account can take much longer
          # while Apple vets it. Without this, a stuck submission hangs the job
          # to the 6h runner limit. On timeout the step fails (submission id is
          # printed) — just re-run; the account is "warm" after the first one.
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          # secret files + keychain are wiped by the EXIT trap (cleanup)
      - name: package
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DIR="target/aarch64-apple-darwin/release"
          # headless CLI tarball (no app — the GUI ships as the cask)
          ARCHIVE="lore-${TAG}-aarch64-apple-darwin.tar.gz"
          mkdir staging
          for bin in lore lore-serve lore-worker lore-desktop; do
            cp "$DIR/$bin" staging/
          done
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          # notarized + stapled app for the cask
          APP_ARCHIVE="Lore-${TAG}-aarch64-apple-darwin.zip"
          ditto -c -k --keepParent Lore.app "$APP_ARCHIVE"
          echo "APP_ARCHIVE=$APP_ARCHIVE" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.APP_ARCHIVE }}
          generate_release_notes: true

  # Bump the Homebrew tap (AoJ/homebrew-lore): download the just-published
  # assets, hash them, render the formula (headless CLI) + cask (notarized
  # Lore.app), and push to the tap. Runs after every build job so all assets
  # exist. GITHUB_TOKEN reads this repo's release; DEPS_UPDATE_TOKEN (write on
  # both repos) pushes to the tap — the default token can't push cross-repo.
  homebrew:
    name: bump homebrew tap
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dist \
            --pattern "lore-$TAG-*.tar.gz" \
            --pattern "Lore-$TAG-*.zip"
          ls -l dist
      - name: render formula + cask
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          sha() { sha256sum "dist/$1" | awk '{print $1}'; }
          SHA_MACOS_ARM="$(sha "lore-$TAG-aarch64-apple-darwin.tar.gz")"
          SHA_LINUX_X86="$(sha "lore-$TAG-x86_64-unknown-linux-gnu.tar.gz")"
          SHA_LINUX_ARM="$(sha "lore-$TAG-aarch64-unknown-linux-gnu.tar.gz")"
          SHA_APP="$(sha "Lore-$TAG-aarch64-apple-darwin.zip")"

          mkdir -p out/Formula out/Casks
          render() {
            sed -e "s/@@VERSION@@/$VERSION/g" \
                -e "s/@@SHA_MACOS_ARM@@/$SHA_MACOS_ARM/g" \
                -e "s/@@SHA_LINUX_X86@@/$SHA_LINUX_X86/g" \
                -e "s/@@SHA_LINUX_ARM@@/$SHA_LINUX_ARM/g" \
                -e "s/@@SHA_APP@@/$SHA_APP/g" \
                "$1"
          }
          render tools/homebrew/lore.formula.rb > out/Formula/lore.rb
          render tools/homebrew/lore.cask.rb    > out/Casks/lore.rb
      - name: push to tap
        env:
          TAP_TOKEN: ${{ secrets.DEPS_UPDATE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/AoJ/homebrew-lore.git" tap
          mkdir -p tap/Formula tap/Casks
          cp out/Formula/lore.rb tap/Formula/lore.rb
          cp out/Casks/lore.rb   tap/Casks/lore.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "tap already up to date"
          else
            git commit -m "lore $VERSION"
            git push
          fi
