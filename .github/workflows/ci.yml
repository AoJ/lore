name: CI

# Linux checks run inside the pinned nix dev shell (dev-env/flake.nix) so CI
# uses the exact toolchain + GTK/WebKit stack as local dev — no ad-hoc apt
# installs. The OS-specific binaries (Windows .exe, macOS desktop) are built
# natively on their own runners; see release.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Auto-format on push to main and commit the result back. Lightweight, so
  # it stays on rustup rather than booting nix.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: cargo fmt"
            git push
          fi

  # Clippy + tests + dependency audit, all inside the nix dev shell. The shell
  # carries GTK3/WebKit (for lore-ui) and cargo-deny, so no apt step is needed.
  # check-arch (sentrux) is omitted — sentrux isn't packaged in nix; run
  # `make check-arch` locally before a PR.
  checks:
    name: clippy + test + audit (nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: clippy + test + audit
        run: |
          nix develop ./dev-env --command bash -c '
            set -euo pipefail
            cargo clippy --workspace --exclude lore-e2e -- -D warnings
            cargo test --workspace --exclude lore-e2e
            cargo deny check
          '

  # WASM web bundle via dx + wasm-bindgen (both version-pinned in the flake) —
  # the part of CI where the pinned toolchain matters most.
  web:
    name: web bundle (nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: build web bundle
        run: nix develop ./dev-env --command make web
      - uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
          if-no-files-found: error
