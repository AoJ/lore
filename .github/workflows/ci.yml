name: CI

# Linux checks run inside the pinned nix dev shell (dev-env/flake.nix) so CI
# uses the exact toolchain + GTK/WebKit stack as local dev — no ad-hoc apt
# installs. The OS-specific binaries (Windows .exe, macOS desktop) are built
# natively on their own runners; see release.yml.

on:
  push:
    branches: [main, dev-env-nix]
  pull_request:
    branches: [main, dev-env-nix]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Verify formatting (check-only). Lightweight, so it stays on rustup rather
  # than booting nix. Run `cargo fmt --all` (or `make fmt`) locally to fix.
  #
  # Deliberately NOT auto-commit-and-push: that pattern bit us twice — a bot
  # push from this job doesn't re-trigger ci.yml (GITHUB_TOKEN anti-recursion),
  # and checking out a named branch raced the deps-update auto-merge that
  # deletes the branch mid-run (`git fetch <deleted-branch>` → exit 1). A pure
  # check has no checkout-by-branch and no push, so neither failure mode exists.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # Clippy + tests + dependency audit, all inside the nix dev shell. The shell
  # carries GTK3/WebKit (for lore-ui) and cargo-deny, so no apt step is needed.
  # check-arch (sentrux) is omitted — sentrux isn't packaged in nix; run
  # `make check-arch` locally before a PR.
  checks:
    name: clippy + test + audit (nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: free disk space
        # The full dev-shell plus a debug build of the Dioxus/chromiumoxide/
        # WebKit stack exhausts the runner's free space ("No space left on
        # device" during link / cargo-deny fetch). Reclaim ~18 GB of
        # preinstalled bloat this job never uses (nix provides its own toolchain,
        # so the hostedtoolcache/dotnet/android/ghc trees are dead weight here).
        run: |
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL \
            /opt/ghc \
            /usr/share/dotnet \
            /usr/local/share/boost \
            /usr/share/swift || true
          sudo docker image prune --all --force || true
          df -h /
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: clippy + test + audit
        run: |
          nix develop ./dev-env --command bash -c '
            set -euo pipefail
            cargo clippy --workspace --exclude lore-e2e -- -D warnings
            cargo test --workspace --exclude lore-e2e
            cargo deny check
          '

  # WASM web bundle via dx + wasm-bindgen (both version-pinned in the flake) —
  # the part of CI where the pinned toolchain matters most.
  web:
    name: web bundle (nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: build web bundle
        # `#web`: minimal shell (no CloakBrowser / WebKitGTK / cargo-* tools) so
        # the closure fits the runner's disk.
        run: nix develop ./dev-env#web --command make web
      - uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: crates/lore-server/static/
          if-no-files-found: error
